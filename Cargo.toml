[package]
description = "A command line tool for remembering what you were doing and tracking what you've done"
edition = "2024"
license = "MIT"
name = "doing"
repository = "https://github.com/aaronmallen/doing"
version = "0.1.0"

[dependencies]
chrono = { features = ["serde"], version = "0.4" }
dir_spec = "0.5"
json_comments = "0.2"
regex = "1"
serde = { features = ["derive"], version = "1" }
serde_json = "1"
thiserror = "2"
toml = "1"
typed-env = "0.3"
yaml_serde = "0.10"

[dev-dependencies]
pretty_assertions = "1"
tempfile = "3"
